<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Búsqueda local de precios</title>
  </head>
  <body>
    <h1>Búsqueda local de precios (radio 50 km)</h1>
    <p><a href="/sources">Fuentes</a> | <a href="/history">Historial</a></p>
    <form id="search-form">
      <label>
        Ubicación:
        <input type="text" name="location" required placeholder="ej. Madrid, España" />
      </label>
      <br />
      <label>
        Productos/servicios (separados por coma):
        <input type="text" name="products" required placeholder="ej. fontanero, cerámica 60x60" />
      </label>
      <br />
      <button type="submit">Buscar precios en la zona</button>
    </form>

    <p id="message"></p>
    <p id="link-report" style="display:none;">
      <a id="report-url" href="">Ver informe comparativo y descargar PDF</a>
    </p>

    <script>
      const form = document.getElementById("search-form");
      const messageEl = document.getElementById("message");
      const linkReport = document.getElementById("link-report");
      const reportUrl = document.getElementById("report-url");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        messageEl.textContent = "Buscando...";
        linkReport.style.display = "none";

        const formData = new FormData(form);
        const location = formData.get("location");
        const products = String(formData.get("products"))
          .split(",")
          .map((p) => p.trim())
          .filter(Boolean);

        try {
          const resp = await fetch("/api/local-search", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ location, products }),
          });
          const data = await resp.json();
          if (!resp.ok) {
            if (resp.status === 429) {
              messageEl.textContent = "Demasiadas búsquedas. Espera un minuto y vuelve a intentar.";
            } else {
              messageEl.textContent = "Error: " + (data.detail || resp.statusText);
            }
            return;
          }
          messageEl.textContent = "Listo. Ubicación geocodificada y precios obtenidos.";
          reportUrl.href = "/report/" + data.search_id;
          linkReport.style.display = "block";
        } catch (err) {
          messageEl.textContent = "Error de conexión: " + err.message;
        }
      });
    </script>
  </body>
</html>
